<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FuelShield is a gas price protection subscription with monthly gallon allowances and a dedicated Fuel Card.">
  <title>FuelShield | Predictable Gas Protection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            shield: {
              ink: "#061018",
              panel: "#0d1c2a",
              line: "rgba(148, 173, 198, 0.18)",
              mint: "#36e28f",
              blue: "#3ab8ff"
            }
          },
          boxShadow: {
            glow: "0 24px 80px rgba(54, 226, 143, 0.22)",
            card: "0 24px 70px rgba(0, 0, 0, 0.32)"
          }
        }
      }
    };
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="./styles.css?v=20260626-react">
</head>
<body class="bg-shield-ink text-slate-50 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    const plans = [
      {
        name: "Bronze",
        price: "$29",
        gallons: "40 protected gallons/month",
        threshold: "Protection above $4.25/gal",
        detail: "Dedicated Fuel Card",
        cta: "Estimate Bronze"
      },
      {
        name: "Silver",
        price: "$50",
        gallons: "75 protected gallons/month",
        threshold: "Protection above $3.50/gal",
        detail: "90% monthly card-use requirement",
        cta: "Estimate Silver",
        popular: true
      },
      {
        name: "Gold",
        price: "$89",
        gallons: "125 protected gallons/month",
        threshold: "Protection above $3.25/gal",
        detail: "Priority account review",
        cta: "Estimate Gold"
      }
    ];

    const protocolItems = [
      ["Fuel Card required", "Covered fuel must be purchased with the issued FuelShield card for the transaction to qualify."],
      ["Monthly usage threshold", "Plans may require a minimum share of monthly fuel purchases to run through the card."],
      ["Suspension for misuse", "Repeatedly fueling with another payment method or missing required usage can suspend protection."],
      ["Reimbursements are capped", "Protection applies only to eligible gallons within the included monthly allowance."],
      ["Extra gallons are market price", "Gallons beyond the plan allowance are billed at pump price or receive no protection."]
    ];

    const faqs = [
      ["What happens if gas is below my protected price?", "You simply pay the lower pump price. Reimbursements only apply when the eligible pump price is above your plan's protected price."],
      ["What if I exceed my gallon allowance?", "Your plan protection stops at the included gallons. Extra gallons are billed at market price or receive no protection."],
      ["Why require the Fuel Card every time?", "The card verifies price, location, gallons, and usage. That transaction data is how FuelShield confirms coverage and prevents misuse."],
      ["Can protection be suspended?", "Yes. Missing required card usage or repeatedly using another payment method for covered fuel can suspend protection until the account is reviewed."]
    ];

    const currency = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    function App() {
      const [pumpPrice, setPumpPrice] = useState("4.65");
      const [protectedPrice, setProtectedPrice] = useState("3.50");
      const [coveredGallons, setCoveredGallons] = useState("75");
      const [form, setForm] = useState({
        name: "",
        email: "",
        zip: "",
        gallons: "",
        plan: "Silver"
      });
      const [errors, setErrors] = useState({});
      const [submitted, setSubmitted] = useState(false);

      const estimate = useMemo(() => {
        const pump = Math.max(parseFloat(pumpPrice) || 0, 0);
        const protectedRate = Math.max(parseFloat(protectedPrice) || 0, 0);
        const gallons = Math.max(parseFloat(coveredGallons) || 0, 0);
        const spread = Math.max(pump - protectedRate, 0);

        return {
          spread,
          gallons,
          total: spread * gallons
        };
      }, [pumpPrice, protectedPrice, coveredGallons]);

      function updateField(event) {
        const { name, value } = event.target;
        setForm((current) => ({ ...current, [name]: value }));
        setErrors((current) => ({ ...current, [name]: "" }));
        setSubmitted(false);
      }

      function validateWaitlist() {
        const nextErrors = {};
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const zipPattern = /^\d{5}$/;
        const gallons = Number(form.gallons);

        if (form.name.trim().length < 2) {
          nextErrors.name = "Enter your full name.";
        }
        if (!emailPattern.test(form.email.trim())) {
          nextErrors.email = "Enter a valid email address.";
        }
        if (!zipPattern.test(form.zip.trim())) {
          nextErrors.zip = "Enter a 5-digit ZIP code.";
        }
        if (!Number.isFinite(gallons) || gallons < 10 || gallons > 250) {
          nextErrors.gallons = "Enter monthly gallons between 10 and 250.";
        }
        if (!form.plan) {
          nextErrors.plan = "Choose a preferred plan.";
        }

        return nextErrors;
      }

      function submitWaitlist(event) {
        event.preventDefault();
        const nextErrors = validateWaitlist();
        setErrors(nextErrors);

        if (Object.keys(nextErrors).length > 0) {
          setSubmitted(false);
          return;
        }

        const entry = {
          ...form,
          createdAt: new Date().toISOString()
        };
        localStorage.setItem("fuelshield.waitlist", JSON.stringify(entry));
        setSubmitted(true);
      }

      return (
        <div className="min-h-screen overflow-hidden bg-[radial-gradient(circle_at_top_left,rgba(54,226,143,0.18),transparent_34rem),radial-gradient(circle_at_top_right,rgba(58,184,255,0.16),transparent_30rem),linear-gradient(180deg,#071018_0%,#08131d_42%,#050b12_100%)]">
          <a href="#main" className="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-full focus:bg-shield-mint focus:px-4 focus:py-2 focus:text-sm focus:font-bold focus:text-slate-950">Skip to content</a>
          <Header />

          <main id="main">
            <Hero />
            <HowItWorks />
            <Plans />
            <Protocol />
            <Calculator
              pumpPrice={pumpPrice}
              setPumpPrice={setPumpPrice}
              protectedPrice={protectedPrice}
              setProtectedPrice={setProtectedPrice}
              coveredGallons={coveredGallons}
              setCoveredGallons={setCoveredGallons}
              estimate={estimate}
            />
            <FAQ />
            <Waitlist
              form={form}
              errors={errors}
              submitted={submitted}
              updateField={updateField}
              submitWaitlist={submitWaitlist}
            />
          </main>

          <footer className="mx-auto flex w-[min(100%_-_2rem,1160px)] flex-col gap-3 border-t border-white/10 py-8 text-sm text-slate-400 sm:flex-row sm:items-center sm:justify-between">
            <span className="font-semibold text-slate-200">FuelShield</span>
            <span>Gas price protection subscriptions for predictable monthly driving costs.</span>
          </footer>
        </div>
      );
    }

    function Header() {
      return (
        <header className="sticky top-0 z-40 border-b border-white/10 bg-[#071018]/80 backdrop-blur-xl">
          <nav className="mx-auto flex min-h-[76px] w-[min(100%_-_2rem,1160px)] items-center justify-between gap-5" aria-label="Primary navigation">
            <a href="#" className="flex items-center gap-3 font-extrabold tracking-normal">
              <span className="grid h-9 w-9 place-items-center rounded-xl bg-gradient-to-br from-shield-mint to-shield-blue text-sm font-black text-slate-950 shadow-glow">F</span>
              <span>FuelShield</span>
            </a>
            <div className="hidden items-center gap-7 text-sm font-medium text-slate-300 md:flex">
              <a className="transition hover:text-white" href="#how-it-works">How it works</a>
              <a className="transition hover:text-white" href="#plans">Plans</a>
              <a className="transition hover:text-white" href="#protocol">Protocol</a>
              <a className="transition hover:text-white" href="#faq">FAQ</a>
            </div>
            <a href="#waitlist" className="rounded-full border border-white/15 bg-white/5 px-5 py-3 text-sm font-bold transition hover:-translate-y-0.5 hover:border-shield-blue/60 hover:bg-shield-blue/10">Join Waitlist</a>
          </nav>
        </header>
      );
    }

    function Hero() {
      return (
        <section className="mx-auto grid w-[min(100%_-_2rem,1160px)] items-center gap-12 py-16 lg:grid-cols-[1.05fr_0.85fr] lg:py-24" aria-labelledby="hero-title">
          <div>
            <p className="mb-5 inline-flex items-center gap-2 rounded-full border border-shield-mint/25 bg-shield-mint/10 px-3 py-2 text-sm font-bold text-emerald-100">
              <span className="h-2.5 w-2.5 rounded-full bg-shield-mint shadow-[0_0_0_7px_rgba(54,226,143,0.13)]"></span>
              Monthly gas price protection
            </p>
            <h1 id="hero-title" className="max-w-4xl text-5xl font-black leading-[0.96] tracking-normal text-white sm:text-6xl lg:text-7xl">
              Know your fuel cost before prices spike.
            </h1>
            <p className="mt-6 max-w-2xl text-lg leading-8 text-slate-300">
              FuelShield gives drivers a protected fuel price, a monthly gallon allowance, and a dedicated Fuel Card that verifies every covered purchase. When pump prices rise above your plan threshold, eligible gallons are reimbursed up to your allowance.
            </p>
            <div className="mt-8 flex flex-col gap-3 sm:flex-row">
              <a className="rounded-full bg-gradient-to-r from-shield-mint to-emerald-300 px-6 py-3 text-center font-extrabold text-slate-950 shadow-glow transition hover:-translate-y-0.5" href="#waitlist">Request Early Access</a>
              <a className="rounded-full border border-white/15 bg-white/5 px-6 py-3 text-center font-extrabold text-white transition hover:-translate-y-0.5 hover:border-shield-blue/60 hover:bg-shield-blue/10" href="#how-it-works">See How It Works</a>
            </div>
            <div className="mt-9 grid overflow-hidden rounded-3xl border border-white/10 bg-white/[0.035] sm:grid-cols-3">
              {[
                ["40-125", "protected gallons monthly"],
                ["1 card", "required for covered fuel"],
                ["Live", "monthly protection tracking"]
              ].map(([value, label]) => (
                <div key={label} className="border-b border-white/10 p-5 sm:border-b-0 sm:border-r last:border-0">
                  <span className="block text-xl font-black text-white">{value}</span>
                  <span className="text-sm text-slate-400">{label}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="relative grid min-h-[390px] place-items-center">
            <div className="absolute h-[82%] w-[82%] rounded-full bg-[conic-gradient(from_160deg,rgba(54,226,143,0.25),rgba(58,184,255,0.34),transparent_68%)] blur-md"></div>
            <div className="relative aspect-[1.58] w-[min(100%,430px)] rotate-[-4deg] overflow-hidden rounded-[30px] border border-white/25 bg-gradient-to-br from-emerald-300 to-blue-500 p-7 text-slate-950 shadow-card">
              <div className="absolute -right-24 -top-28 h-64 w-64 rounded-full bg-white/25"></div>
              <div className="absolute -bottom-24 -left-20 h-48 w-48 rounded-full bg-white/20"></div>
              <div className="relative flex items-start justify-between gap-4">
                <span className="text-2xl font-black">FuelShield</span>
                <span className="h-10 w-14 rounded-xl border border-white/60 bg-white/50 shadow-inner"></span>
              </div>
              <div className="relative my-10 text-2xl font-black tracking-[0.16em] sm:text-3xl">4829&nbsp;1175&nbsp;9034&nbsp;2218</div>
              <div className="relative flex items-end justify-between gap-5">
                <div>
                  <span className="block text-xs font-black uppercase tracking-wider text-slate-900/70">Allowance</span>
                  <span className="text-lg font-black">75 GAL / MO</span>
                </div>
                <div>
                  <span className="block text-xs font-black uppercase tracking-wider text-slate-900/70">Type</span>
                  <span className="text-lg font-black">Protected Fuel Card</span>
                </div>
              </div>
            </div>
            <aside className="relative mt-[-22px] w-full rounded-2xl border border-white/15 bg-[#0b1824]/90 p-4 text-sm text-slate-200 shadow-card backdrop-blur lg:absolute lg:bottom-8 lg:right-0 lg:mt-0 lg:max-w-60">
              <strong className="mb-1 block text-shield-mint">Card verified</strong>
              Covered purchases must run through the Fuel Card to keep protection active.
            </aside>
          </div>
        </section>
      );
    }

    function SectionHeading({ title, children }) {
      return (
        <div className="mb-8 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
          <h2 className="text-4xl font-black leading-tight tracking-normal text-white lg:text-5xl">{title}</h2>
          <p className="max-w-xl text-slate-400">{children}</p>
        </div>
      );
    }

    function HowItWorks() {
      return (
        <section id="how-it-works" className="mx-auto w-[min(100%_-_2rem,1160px)] py-16" aria-labelledby="how-title">
          <SectionHeading title="How it works">
            FuelShield is built around simple monthly coverage: pick a plan, fuel with the card, and receive protection when pump prices climb above your plan price.
          </SectionHeading>
          <div className="grid gap-5 md:grid-cols-3">
            {[
              ["1", "Subscribe monthly", "Choose the gallon allowance and protected price that matches your driving pattern, then keep coverage active month to month."],
              ["2", "Use your Fuel Card", "Every covered fuel purchase must be made with the FuelShield card so gallons, prices, and plan compliance can be verified."],
              ["3", "Get protected", "When eligible pump prices exceed your protected price, FuelShield estimates reimbursement on covered gallons up to your monthly cap."]
            ].map(([step, title, body]) => (
              <article key={title} className="rounded-3xl border border-white/10 bg-gradient-to-b from-[#122235]/95 to-[#0a1622]/90 p-6 shadow-card transition hover:-translate-y-1 hover:border-shield-blue/40">
                <div className="mb-5 grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-shield-mint to-shield-blue font-black text-slate-950">{step}</div>
                <h3 className="text-xl font-black text-white">{title}</h3>
                <p className="mt-2 text-slate-400">{body}</p>
              </article>
            ))}
          </div>
        </section>
      );
    }

    function Plans() {
      return (
        <section id="plans" className="bg-white/[0.025] py-16" aria-labelledby="plans-title">
          <div className="mx-auto w-[min(100%_-_2rem,1160px)]">
            <SectionHeading title="Pricing plans">
              Start with a practical allowance and upgrade as your monthly driving needs grow. All plans include a dedicated Fuel Card.
            </SectionHeading>
            <div className="grid gap-5 md:grid-cols-3">
              {plans.map((plan) => (
                <article key={plan.name} className={`relative flex min-h-full flex-col rounded-3xl border bg-gradient-to-b from-[#122235]/95 to-[#0a1622]/90 p-6 shadow-card transition hover:-translate-y-1 ${plan.popular ? "border-shield-mint/50 shadow-glow" : "border-white/10 hover:border-shield-blue/40"}`}>
                  {plan.popular && <span className="absolute right-5 top-5 rounded-full bg-shield-mint px-3 py-1 text-xs font-black text-slate-950">Most Popular</span>}
                  <h3 className="text-xl font-black">{plan.name}</h3>
                  <div className="mt-3 text-5xl font-black">{plan.price}<span className="text-base font-bold text-slate-400">/mo</span></div>
                  <ul className="my-6 grid gap-3 text-slate-300">
                    {[plan.gallons, plan.threshold, plan.detail].map((feature) => (
                      <li key={feature} className="flex gap-3">
                        <span className="mt-2 h-2.5 w-2.5 rounded-full bg-shield-mint shadow-[0_0_0_5px_rgba(54,226,143,0.1)]"></span>
                        <span>{feature}</span>
                      </li>
                    ))}
                  </ul>
                  <a href="#calculator" className={`mt-auto rounded-full px-5 py-3 text-center font-black transition hover:-translate-y-0.5 ${plan.popular ? "bg-gradient-to-r from-shield-mint to-emerald-300 text-slate-950 shadow-glow" : "border border-white/15 bg-white/5 text-white hover:border-shield-blue/60 hover:bg-shield-blue/10"}`}>{plan.cta}</a>
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Protocol() {
      return (
        <section id="protocol" className="mx-auto grid w-[min(100%_-_2rem,1160px)] gap-5 py-16 lg:grid-cols-[0.78fr_1.22fr]" aria-labelledby="protocol-title">
          <div className="rounded-3xl border border-white/10 bg-gradient-to-b from-[#122235]/95 to-[#0a1622]/90 p-7 shadow-card">
            <p className="mb-5 inline-flex items-center gap-2 rounded-full border border-shield-mint/25 bg-shield-mint/10 px-3 py-2 text-sm font-bold text-emerald-100">
              <span className="h-2.5 w-2.5 rounded-full bg-shield-mint shadow-[0_0_0_7px_rgba(54,226,143,0.13)]"></span>
              Fair-use protocol
            </p>
            <h2 id="protocol-title" className="text-4xl font-black leading-tight text-white">Protection works when card usage is verifiable.</h2>
            <p className="mt-4 text-slate-400">FuelShield prevents misuse by tying protection to verified Fuel Card transactions. That keeps plan pricing fair for drivers who use the service as intended.</p>
          </div>
          <div className="grid gap-4 md:grid-cols-2">
            {protocolItems.map(([title, body]) => (
              <div key={title} className="rounded-2xl border border-white/10 bg-white/[0.035] p-5">
                <strong className="block text-lg text-white">{title}</strong>
                <span className="mt-2 block text-slate-400">{body}</span>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function Calculator({ pumpPrice, setPumpPrice, protectedPrice, setProtectedPrice, coveredGallons, setCoveredGallons, estimate }) {
      return (
        <section id="calculator" className="mx-auto w-[min(100%_-_2rem,1160px)] py-16" aria-labelledby="calculator-title">
          <SectionHeading title="Savings calculator">
            Estimate monthly protection using your pump price, plan protected price, and covered gallons.
          </SectionHeading>
          <form className="grid gap-6 rounded-3xl border border-white/10 bg-gradient-to-b from-[#122235]/95 to-[#0a1622]/90 p-6 shadow-card lg:grid-cols-[1fr_320px]" aria-describedby="calculator-help">
            <div>
              <div className="grid gap-4 md:grid-cols-3">
                <NumberField id="pump-price" label="Pump price per gallon" value={pumpPrice} onChange={setPumpPrice} step="0.01" />
                <NumberField id="protected-price" label="Protected price per gallon" value={protectedPrice} onChange={setProtectedPrice} step="0.01" />
                <NumberField id="covered-gallons" label="Covered gallons" value={coveredGallons} onChange={setCoveredGallons} step="1" />
              </div>
              <p id="calculator-help" className="mt-5 text-sm text-slate-400">Formula: max(pump price - protected price, 0) x covered gallons. Actual reimbursements depend on eligibility, card usage, and your monthly cap.</p>
            </div>
            <output className="flex flex-col justify-center rounded-2xl border border-shield-mint/30 bg-gradient-to-br from-shield-mint/15 to-shield-blue/10 p-6">
              <span className="font-bold text-slate-300">Estimated monthly protection</span>
              <span className="my-2 text-5xl font-black leading-none text-shield-mint">{currency.format(estimate.total)}</span>
              <span className="text-sm text-slate-400">{currency.format(estimate.spread)} protected spread across {estimate.gallons.toLocaleString("en-US")} gallons</span>
            </output>
          </form>
        </section>
      );
    }

    function NumberField({ id, label, value, onChange, step }) {
      return (
        <div>
          <label htmlFor={id} className="mb-2 block font-bold text-slate-200">{label}</label>
          <input
            id={id}
            type="number"
            min="0"
            step={step}
            value={value}
            onChange={(event) => onChange(event.target.value)}
            className="min-h-[54px] w-full rounded-2xl border border-white/15 bg-black/25 px-4 text-white outline-none transition focus:border-shield-mint focus:ring-4 focus:ring-shield-mint/10"
          />
        </div>
      );
    }

    function FAQ() {
      return (
        <section id="faq" className="mx-auto w-[min(100%_-_2rem,1160px)] py-16" aria-labelledby="faq-title">
          <SectionHeading title="FAQ">
            Clear rules help drivers understand exactly when protection applies and where the monthly limits are.
          </SectionHeading>
          <div className="grid gap-5 md:grid-cols-2">
            {faqs.map(([question, answer]) => (
              <article key={question} className="rounded-3xl border border-white/10 bg-gradient-to-b from-[#122235]/95 to-[#0a1622]/90 p-6 shadow-card transition hover:-translate-y-1 hover:border-shield-blue/40">
                <h3 className="text-xl font-black text-white">{question}</h3>
                <p className="mt-2 text-slate-400">{answer}</p>
              </article>
            ))}
          </div>
        </section>
      );
    }

    function Waitlist({ form, errors, submitted, updateField, submitWaitlist }) {
      return (
        <section id="waitlist" className="mx-auto w-[min(100%_-_2rem,1160px)] py-16" aria-labelledby="waitlist-title">
          <div className="grid gap-8 rounded-[32px] border border-shield-mint/25 bg-gradient-to-br from-shield-mint/15 via-[#101e2d]/95 to-shield-blue/10 p-6 shadow-card lg:grid-cols-[0.9fr_1.1fr] lg:p-9">
            <div>
              <p className="mb-5 inline-flex items-center gap-2 rounded-full border border-shield-mint/25 bg-shield-mint/10 px-3 py-2 text-sm font-bold text-emerald-100">
                <span className="h-2.5 w-2.5 rounded-full bg-shield-mint shadow-[0_0_0_7px_rgba(54,226,143,0.13)]"></span>
                Early access
              </p>
              <h2 id="waitlist-title" className="text-4xl font-black leading-tight text-white lg:text-5xl">Make fuel costs predictable.</h2>
              <p className="mt-4 text-slate-300">Join the FuelShield waitlist and tell us how much you usually drive. This demo validates locally and stores your entry in this browser only.</p>
              <div className="mt-7 rounded-2xl border border-white/10 bg-black/20 p-5 text-sm text-slate-300">
                <strong className="block text-white">Local demo behavior</strong>
                No data is sent to a server. A successful entry is saved to localStorage as <span className="font-mono text-shield-mint">fuelshield.waitlist</span>.
              </div>
            </div>

            <form className="grid gap-4" onSubmit={submitWaitlist} noValidate>
              <TextInput id="name" name="name" label="Full name" value={form.name} onChange={updateField} error={errors.name} autoComplete="name" />
              <TextInput id="email" name="email" type="email" label="Email address" value={form.email} onChange={updateField} error={errors.email} autoComplete="email" />
              <div className="grid gap-4 sm:grid-cols-2">
                <TextInput id="zip" name="zip" label="ZIP code" value={form.zip} onChange={updateField} error={errors.zip} autoComplete="postal-code" inputMode="numeric" maxLength="5" />
                <TextInput id="gallons" name="gallons" type="number" label="Monthly gallons" value={form.gallons} onChange={updateField} error={errors.gallons} min="10" max="250" />
              </div>
              <div>
                <label htmlFor="plan" className="mb-2 block font-bold text-slate-200">Preferred plan</label>
                <select
                  id="plan"
                  name="plan"
                  value={form.plan}
                  onChange={updateField}
                  className={`min-h-[54px] w-full rounded-2xl border bg-black/25 px-4 text-white outline-none transition focus:border-shield-mint focus:ring-4 focus:ring-shield-mint/10 ${errors.plan ? "border-red-400" : "border-white/15"}`}
                >
                  <option className="bg-slate-950" value="Bronze">Bronze</option>
                  <option className="bg-slate-950" value="Silver">Silver</option>
                  <option className="bg-slate-950" value="Gold">Gold</option>
                </select>
                {errors.plan && <p className="mt-2 text-sm font-semibold text-red-300">{errors.plan}</p>}
              </div>
              <button type="submit" className="mt-2 rounded-full bg-gradient-to-r from-shield-mint to-emerald-300 px-6 py-4 font-black text-slate-950 shadow-glow transition hover:-translate-y-0.5">
                Request Early Access
              </button>
              {submitted && (
                <p className="rounded-2xl border border-shield-mint/35 bg-shield-mint/10 p-4 text-sm font-semibold text-emerald-100" role="status">
                  You're on the list. FuelShield saved this waitlist entry locally for the demo.
                </p>
              )}
            </form>
          </div>
        </section>
      );
    }

    function TextInput({ id, name, label, value, onChange, error, type = "text", ...props }) {
      return (
        <div>
          <label htmlFor={id} className="mb-2 block font-bold text-slate-200">{label}</label>
          <input
            id={id}
            name={name}
            type={type}
            value={value}
            onChange={onChange}
            aria-invalid={Boolean(error)}
            aria-describedby={error ? `${id}-error` : undefined}
            className={`min-h-[54px] w-full rounded-2xl border bg-black/25 px-4 text-white outline-none transition placeholder:text-slate-500 focus:border-shield-mint focus:ring-4 focus:ring-shield-mint/10 ${error ? "border-red-400" : "border-white/15"}`}
            {...props}
          />
          {error && <p id={`${id}-error`} className="mt-2 text-sm font-semibold text-red-300">{error}</p>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
